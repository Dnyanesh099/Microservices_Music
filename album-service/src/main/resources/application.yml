spring:
  application:
    name: album-service
  datasource:
    url: jdbc:postgresql://localhost:5432/albumdb
    username: album
    password: album123
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

management.zipkin.tracing.endpoint: http://localhost:9411/api/v2/spans
